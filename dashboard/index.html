<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tripp.Mind Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a0f;
      --panel: #111722;
      --panel-2: #151d2b;
      --text: #eef3f8;
      --muted: #91a0b4;
      --line: #263347;
      --green: #4ade80;
      --red: #fb7185;
      --yellow: #fbbf24;
      --blue: #60a5fa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(96, 165, 250, 0.16), transparent 32rem), var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 20px;
    }

    h1, h2, p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1;
      font-weight: 760;
    }

    h2 {
      font-size: 15px;
      font-weight: 700;
      color: #dbeafe;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(220px, 320px) minmax(220px, 360px) auto;
      gap: 8px;
      align-items: center;
    }

    input, button {
      height: 38px;
      border: 1px solid var(--line);
      background: #0d1320;
      color: var(--text);
      border-radius: 6px;
      padding: 0 12px;
      font: inherit;
      min-width: 0;
    }

    button {
      cursor: pointer;
      background: #1f6feb;
      border-color: #2f81f7;
      font-weight: 700;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .panel, .stat {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent), var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .stat {
      padding: 14px;
      min-height: 94px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 760;
    }

    .value {
      margin-top: 12px;
      font-size: 30px;
      line-height: 1;
      font-weight: 800;
    }

    .panel {
      min-height: 280px;
      overflow: hidden;
    }

    .panel-head {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--yellow);
      box-shadow: 0 0 16px currentColor;
    }

    .ok .dot {
      background: var(--green);
    }

    .bad .dot {
      background: var(--red);
    }

    #graph {
      width: 100%;
      height: 520px;
      display: block;
      background: #080d16;
      cursor: grab;
    }
    #graph:active {
      cursor: grabbing;
    }
    .node-label {
      font-size: 10px;
      fill: #eef3f8;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      text-anchor: middle;
      dominant-baseline: central;
    }
    .node-label.visible {
      opacity: 1;
    }
    }

    .list {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .row {
      display: grid;
      gap: 4px;
      padding: 10px;
      background: var(--panel-2);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 6px;
    }

    .row strong {
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .row span {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .health {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .health-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      background: var(--panel-2);
      border-radius: 6px;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 920px) {
      main {
        padding: 16px;
      }

      header, .grid, .controls {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      #graph {
        height: 420px;
      }
    }

    @media (max-width: 520px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Tripp.Mind</h1>
        <p class="sub">Knowledge graph, service health, and backup status.</p>
      </div>
      <div class="controls">
        <input id="gatewayUrl" aria-label="Gateway URL" value="http://localhost:3000">
        <input id="jwtToken" aria-label="Gateway JWT" placeholder="Gateway JWT">
        <button id="refresh">Refresh</button>
      </div>
    </header>

    <section class="stats">
      <div class="stat">
        <div class="label">Notes</div>
        <div class="value" id="noteCount">-</div>
      </div>
      <div class="stat">
        <div class="label">Graph Nodes</div>
        <div class="value" id="nodeCount">-</div>
      </div>
      <div class="stat">
        <div class="label">Links</div>
        <div class="value" id="linkCount">-</div>
      </div>
      <div class="stat">
        <div class="label">Backups</div>
        <div class="value" id="backupCount">-</div>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <div class="panel-head">
          <h2>Knowledge Graph</h2>
          <span class="status" id="graphStatus"><span class="dot"></span><span>Waiting</span></span>
        </div>
        <svg id="graph" role="img" aria-label="Knowledge graph visualization"></svg>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>System Health</h2>
          <span class="small" id="lastUpdated">Never refreshed</span>
        </div>
        <div class="health" id="health"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>Recent Notes</h2>
        </div>
        <div class="list" id="recentNotes"></div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>Backup Status</h2>
        </div>
        <div class="list" id="backups"></div>
      </div>
    </section>
  </main>

  <script>
    const state = {
      graph: { nodes: [], links: [] }
    };

    const gatewayUrl = document.getElementById("gatewayUrl");
    const jwtToken = document.getElementById("jwtToken");
    const refresh = document.getElementById("refresh");

    gatewayUrl.value = localStorage.getItem("tripp.gatewayUrl") || gatewayUrl.value;
    jwtToken.value = localStorage.getItem("tripp.jwtToken") || "";

    refresh.addEventListener("click", load);
    window.addEventListener("resize", () => renderGraph(state.graph));
    load();

    async function load() {
      localStorage.setItem("tripp.gatewayUrl", gatewayUrl.value.trim());
      localStorage.setItem("tripp.jwtToken", jwtToken.value.trim());
      setStatus("graphStatus", "Waiting", "");

      const health = await get("/api/health", false).catch((error) => ({ error: error.message }));
      const noteCount = await post("/api/query/sql", { stmt: "select count(*) as count from blocks where type = 'd'" }).catch(() => []);
      const recent = await post("/api/storage/getRecentDocs", { sortBy: "updated" }).catch(() => []);
      const graph = await post("/api/graph/getGraph", { k: "", conf: {}, reqId: `dashboard-${Date.now()}` }).catch(() => ({ nodes: [], links: [] }));
      const backups = await post("/api/repo/getRepoSnapshots", {}).catch(() => []);
      const bridge = await fetchBridgeHealth().catch((error) => ({ error: error.message }));

      state.graph = graph;
      document.getElementById("noteCount").textContent = String(readCount(noteCount));
      document.getElementById("nodeCount").textContent = String(Array.isArray(graph.nodes) ? graph.nodes.length : 0);
      document.getElementById("linkCount").textContent = String(Array.isArray(graph.links) ? graph.links.length : 0);
      document.getElementById("backupCount").textContent = String(Array.isArray(backups) ? backups.length : 0);
      document.getElementById("lastUpdated").textContent = new Date().toLocaleTimeString();

      renderHealth(health, bridge);
      renderRecent(recent);
      renderBackups(backups);
      renderGraph(graph);
    }

    function headers(auth = true) {
      const value = { "Content-Type": "application/json" };
      if (auth && jwtToken.value.trim()) {
        value.Authorization = `Bearer ${jwtToken.value.trim()}`;
      }
      return value;
    }

    async function get(path, auth = true) {
      const response = await fetch(`${gatewayUrl.value.replace(/\/+$/, "")}${path}`, { headers: headers(auth) });
      return readResponse(response);
    }

    async function post(path, body) {
      const response = await fetch(`${gatewayUrl.value.replace(/\/+$/, "")}${path}`, {
        method: "POST",
        headers: headers(true),
        body: JSON.stringify(body)
      });
      return readResponse(response);
    }

    async function readResponse(response) {
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(body.error || body.msg || `HTTP ${response.status}`);
      }
      return Object.prototype.hasOwnProperty.call(body, "data") ? body.data : body;
    }

    async function fetchBridgeHealth() {
      const url = new URL(gatewayUrl.value);
      url.port = localStorage.getItem("tripp.eventBridgePort") || "3001";
      url.pathname = "/health";
      const response = await fetch(url.toString());
      return readResponse(response);
    }

    function readCount(rows) {
      const first = Array.isArray(rows) ? rows[0] : null;
      return first ? Number(first.count || first["count(*)"] || 0) : 0;
    }

    function renderHealth(gateway, bridge) {
      const items = [
        ["Gateway", gateway && gateway.status === "ok", gateway && (gateway.service || gateway.error || "unknown")],
        ["SiYuan", gateway && !gateway.error, gateway && (gateway.siyuanBaseUrl || "proxied through gateway")],
        ["Event Bridge", bridge && !bridge.error && bridge.status !== "degraded", bridge && (bridge.error || `${bridge.clients || 0} clients`)],
        ["Backup Service", true, "scheduled by container health check"]
      ];

      document.getElementById("health").innerHTML = items.map(([name, ok, detail]) => `
        <div class="health-item">
          <span class="status ${ok ? "ok" : "bad"}"><span class="dot"></span><span>${escapeHtml(name)}</span></span>
          <span class="small">${escapeHtml(detail || "")}</span>
        </div>
      `).join("");
    }

    function renderRecent(docs) {
      const rows = Array.isArray(docs) ? docs.slice(0, 8) : [];
      document.getElementById("recentNotes").innerHTML = rows.length ? rows.map((doc) => `
        <div class="row">
          <strong>${escapeHtml(doc.hPath || doc.title || doc.name || doc.rootID || "Untitled")}</strong>
          <span>${escapeHtml(doc.updated || doc.opened || doc.path || "")}</span>
        </div>
      `).join("") : `<div class="row"><strong>No recent notes</strong><span>Refresh after SiYuan has indexed content.</span></div>`;
    }

    function renderBackups(backups) {
      const rows = Array.isArray(backups) ? backups.slice(0, 6) : [];
      document.getElementById("backups").innerHTML = rows.length ? rows.map((backup) => `
        <div class="row">
          <strong>${escapeHtml(backup.memo || backup.name || backup.id || "Snapshot")}</strong>
          <span>${escapeHtml(backup.created || backup.updated || backup.createdStr || "")}</span>
        </div>
      `).join("") : `<div class="row"><strong>No snapshots reported</strong><span>The backup service creates snapshots on schedule.</span></div>`;
    }

    function renderGraph(graph) {
      const svg = d3.select("#graph");
      const element = svg.node();
      const width = element.clientWidth || 800;
      const height = element.clientHeight || 520;
      const nodes = (Array.isArray(graph.nodes) ? graph.nodes : []).slice(0, 160).map((node) => ({ ...node }));
      const links = (Array.isArray(graph.links) ? graph.links : []).slice(0, 260).map((link) => ({
        source: link.source || link.from || link.fromID,
        target: link.target || link.to || link.toID
      })).filter((link) => link.source && link.target);

      svg.selectAll("*").remove();
      svg.attr("viewBox", `0 0 ${width} ${height}`);

      // --- Zoom group (pan + mouse wheel zoom) ---
      const zoomGroup = svg.append("g");
      const zoom = d3.zoom()
        .scaleExtent([0.2, 8])
        .on("zoom", (event) => {
          zoomGroup.attr("transform", event.transform);
          updateLabels(event.transform.k);
        });
      svg.call(zoom);

      // --- Label visibility based on zoom level ---
      let currentZoom = 1;
      const LABEL_THRESHOLD = 1.8;
      function updateLabels(k) {
        currentZoom = k;
        svg.selectAll(".node-label")
          .classed("visible", k >= LABEL_THRESHOLD)
          .attr("font-size", Math.max(8, 10 / Math.sqrt(k)) + "px");
      }

      if (nodes.length === 0) {
        setStatus("graphStatus", "No graph data", "bad");
        zoomGroup.append("text").attr("x", 24).attr("y", 48).attr("fill", "#91a0b4").text("No graph data available.");
        return;
      }

      setStatus("graphStatus", "Live", "ok");

      // --- Force simulation ---
      const cx = width / 2;
      const cy = height / 2;
      const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id((node) => node.id).distance(60))
        .force("charge", d3.forceManyBody().strength(-130))
        .force("center", d3.forceCenter(cx, cy))
        .force("collision", d3.forceCollide(18));

      const link = zoomGroup.append("g")
        .attr("stroke", "#334155")
        .attr("stroke-opacity", 0.8)
        .selectAll("line")
        .data(links)
        .join("line");

      const node = zoomGroup.append("g")
        .selectAll("circle")
        .data(nodes)
        .join("circle")
        .attr("r", 6)
        .attr("fill", "#60a5fa")
        .attr("stroke", "#1e3a5f")
        .attr("stroke-width", 1.5)
        .call(drag(simulation));

      // --- Node labels (visible when zoomed in past threshold) ---
      const label = zoomGroup.append("g")
        .selectAll("text")
        .data(nodes)
        .join("text")
        .attr("class", "node-label")
        .attr("dy", -12)
        .text((d) => d.label || d.name || d.id);

      // --- Tooltip on hover ---
      node.append("title").text((d) => d.label || d.name || d.id);

      // --- Rotation: slow spin when mouse is over the graph ---
      let rotating = false;
      let rotationRAF = null;
      const ROTATION_SPEED = 0.008;

      function startRotation() {
        if (rotating) return;
        rotating = true;
        function tick() {
          if (!rotating) return;
          nodes.forEach((d) => {
            if (d.fx !== null && d.fx !== undefined) return;
            const dx = d.x - cx;
            const dy = d.y - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 10) {
              d.vx += (-dy / dist) * ROTATION_SPEED;
              d.vy += (dx / dist) * ROTATION_SPEED;
            }
          });
          simulation.alpha(0.01).restart();
          rotationRAF = requestAnimationFrame(tick);
        }
        tick();
      }

      function stopRotation() {
        rotating = false;
        if (rotationRAF) cancelAnimationFrame(rotationRAF);
      }

      svg.on("mouseenter", startRotation);
      svg.on("mouseleave", stopRotation);

      // --- Tick handler ---
      simulation.on("tick", () => {
        link
          .attr("x1", (d) => d.source.x)
          .attr("y1", (d) => d.source.y)
          .attr("x2", (d) => d.target.x)
          .attr("y2", (d) => d.target.y);
        node
          .attr("cx", (d) => d.x)
          .attr("cy", (d) => d.y);
        label
          .attr("x", (d) => d.x)
          .attr("y", (d) => d.y);
      });

      // Start rotation if mouse is already over graph
      if (element.matches(":hover")) startRotation();
    }

    function drag(simulation) {
      return d3.drag()
        .on("start", (event) => {
          if (!event.active) {
            simulation.alphaTarget(0.3).restart();
          }
          event.subject.fx = event.subject.x;
          event.subject.fy = event.subject.y;
        })
        .on("drag", (event) => {
          event.subject.fx = event.x;
          event.subject.fy = event.y;
        })
        .on("end", (event) => {
          if (!event.active) {
            simulation.alphaTarget(0);
          }
          event.subject.fx = null;
          event.subject.fy = null;
        });
    }

    function setStatus(id, text, cls) {
      const element = document.getElementById(id);
      element.className = `status ${cls || ""}`;
      element.querySelector("span:last-child").textContent = text;
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      })[char]);
    }
  </script>
</body>
</html>
